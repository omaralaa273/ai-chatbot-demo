<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Support Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    #app {
      width: 100%;
      max-width: 420px;
      height: 600px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e5e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    #header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e5e0;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
    }
    #avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #E1F5EE;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    #header-name { font-size: 15px; font-weight: 600; color: #111; }
    #header-status { font-size: 12px; color: #1D9E75; display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; display: inline-block; }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg { display: flex; gap: 8px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .bubble {
      padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.55;
    }
    .msg.bot .bubble {
      background: #f5f5f0; color: #111;
      border-bottom-left-radius: 4px;
      border: 1px solid #e5e5e0;
    }
    .msg.user .bubble {
      background: #085041; color: #E1F5EE;
      border-bottom-right-radius: 4px;
    }
    .msg-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: #E1F5EE; display: flex; align-items: center;
      justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px;
    }
    .typing-bubble { display: flex; align-items: center; gap: 5px; padding: 12px 14px; }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #999;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    #suggestions {
      padding: 0 14px 10px;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .sug {
      font-size: 12px; padding: 5px 12px;
      border-radius: 20px; border: 1px solid #ccc;
      background: #fff; color: #555;
      cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .sug:hover { border-color: #1D9E75; color: #1D9E75; }
    #input-area {
      padding: 12px 14px;
      border-top: 1px solid #e5e5e0;
      display: flex; gap: 8px; align-items: flex-end;
    }
    #user-input {
      flex: 1; resize: none;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      min-height: 40px; max-height: 100px;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: #1D9E75; }
    #send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: #085041; border: none;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 18px;
      transition: opacity 0.15s;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #powered {
      text-align: center; font-size: 11px;
      color: #999; padding: 6px;
      border-top: 1px solid #e5e5e0;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="avatar">🤖</div>
    <div>
      <div id="header-name">AI Support Assistant</div>
      <div id="header-status"><span class="dot"></span> Online</div>
    </div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="msg-icon">🤖</div>
      <div class="bubble">👋 Hi! I'm your AI support assistant. I can help with orders, returns, shipping, and product questions. How can I help you today?</div>
    </div>
  </div>

  <div id="suggestions">
    <button class="sug" onclick="useSuggestion(this)">Track my order</button>
    <button class="sug" onclick="useSuggestion(this)">Return policy</button>
    <button class="sug" onclick="useSuggestion(this)">Contact support</button>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
  // ── Demo mode: no API key needed ──
  const DEMO_RESPONSES = {
    greetings: ['hi','hello','hey','hii','helo','heya','sup','yo','howdy','good morning','good afternoon','good evening','hi there','hello there'],
    what:      ['what is this','whats this',"what's this",'what are you','who are you','what do you do','what can you do','tell me about this','explain this','what is this?',"what's this?"],
    how:       ['how are you','how r u','how are u',"how're you",'how are you doing'],
    ok:        ['ok','okay','k','alright','got it','i see','understood','cool','nice','great','awesome','thanks','thank you','thx','ty','thank u'],
    bye:       ['bye','goodbye','see you','see ya','cya','later','take care','good bye','bye bye'],
    yes:       ['yes','yeah','yep','yup','ya','yea'],
    no:        ['no','nope','nah','not really'],
  };

  const DEMO_REPLIES = {
    greetings: "👋 Hello! Welcome. This is a <strong>demo</strong> — in a real deployment I'd be fully configured for your business. How can I help?",
    what:      "🤖 This is a <strong>demo</strong> AI customer support chatbot! It's built with the Claude AI API and can be customized for any business — products, pricing, policies, and more. Want to see what it can do?",
    how:       "I'm doing great, thanks for asking! 😊 I'm an AI, always ready to help. What can I assist you with?",
    ok:        "😊 Sure thing! Feel free to ask me anything — I'm here to help.",
    bye:       "👋 Goodbye! Thanks for trying the demo. Have a great day!",
    yes:       "Great! What would you like to know? I'm here to help. 😊",
    no:        "No problem! Let me know if there's anything else I can help with.",
  };

  const FALLBACK = [
    "Good question! This is a <strong>demo</strong> — in a real setup I'd have full knowledge of your products, FAQs, and policies to answer this properly.",
    "This is a <strong>demo</strong> chatbot. A fully configured version would handle this question accurately. Want a custom one built for your business?",
    "Great question! This is a <strong>demo</strong> — a live version would be trained on your specific business to answer this perfectly.",
  ];

  let fbIdx = 0;

  function getDemoReply(text) {
    const lower = text.toLowerCase().trim().replace(/[!?.]+$/, '');
    for (const [key, phrases] of Object.entries(DEMO_RESPONSES)) {
      if (phrases.includes(lower)) return DEMO_REPLIES[key];
    }
    return FALLBACK[fbIdx++ % FALLBACK.length];
  }

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const suggestionsEl = document.getElementById('suggestions');

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
    div.innerHTML = role === 'bot'
      ? `<div class="msg-icon">🤖</div><div class="bubble">${text}</div>`
      : `<div class="bubble">${text}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = 'typing';
    div.innerHTML = `<div class="msg-icon">🤖</div><div class="bubble"><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    suggestionsEl.style.display = 'none';
    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    addMessage('user', text);
    showTyping();
    await new Promise(r => setTimeout(r, 750));
    removeTyping();
    addMessage('bot', getDemoReply(text));
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function useSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });
</script>
</body>
</html>
